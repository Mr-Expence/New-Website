<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mr_Expence's Games</title>
  <link rel="icon" type="image/x-icon" href="assets/cat_logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap"
    rel="stylesheet">
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style/base.css">
  <link rel="stylesheet" href="style/projects.css">
  <link rel="stylesheet" href="style/topbar.css">
  <script src="https://static.itch.io/api.js"></script>
</head>

<body>
  <script src="header.js"></script>
  <div class="page-wrap">
  </div>
  <div class="wrapper">
    <a class="brand" href="https://mr-expence.github.io" target="_self">
      <img src="assets/cat_logo.png" alt="Mr_Expence" onerror="this.style.display = 'none'" />
      <span class="brand-name" style="color: #e4e6f0">Mr_Expence</span>
    </a>

    <h1 class="heading">
      My
      <em>Games</em>
    </h1>
    <div class="modrinth-list">

      <a class="mr-card itch-card" data-user="mrexpence" data-game="bounty" href="#">
        <div class="mr-icon">
          <!-- Optional: hardcode a cover image if you have one -->
          <img src="/assets/bounty/bounty-icon.png" alt="Cover">
        </div>
        <div class="mr-body">
          <div class="mr-header">
            <span class="mr-title">Loading…</span>
            <span class="mr-author">by Mr_Expence</span>
          </div>
          <p class="mr-desc"></p>
          <div class="mr-meta"></div>
        </div>
      </a>

    </div>
    <script>
      const setCountText = (id, value) => {
        const el = document.getElementById(id);
        if (!el) return;
        el.textContent = value;
      };

      const formatCount = (value) =>
        value == null ? "N/A" : value.toLocaleString();
      // Modrinth
      fetch("https://api.modrinth.com/v2/user/Mr_Expence/projects")
        .then((res) => {
          if (!res.ok) throw new Error("Modrinth fetch failed");
          return res.json();
        })
        .then((projects) => {
          const downloads = projects.reduce(
            (sum, project) => sum + (project.downloads || 0),
            0,
          );
          setCountText("modrinth-count", formatCount(downloads));
        })
        .catch(() => setCountText("modrinth-count", "N/A"));
      // Github
      fetch("https://api.github.com/users/Mr-Expence/repos?per_page=100")
        .then((res) => {
          if (!res.ok) throw new Error("GitHub fetch failed");
          return res.json();
        })
        .then((repos) => {
          const stars = repos.reduce(
            (sum, repo) => sum + (repo.stargazers_count || 0),
            0,
          );
          setCountText("github-count", formatCount(stars));
        })
        .catch(() => setCountText("github-count", "N/A"));
      // CurseForge
      setCountText("curseforge-count", "N/A");
      // Discord
      fetch("https://discord.com/api/guilds/1377934065025679380/widget.json")
        .then((res) => {
          if (!res.ok) throw new Error("Widget not enabled or bad ID");
          return res.json();
        })
        .then((data) => {
          document.getElementById("discord-count").textContent =
            data.presence_count - 3;
        })
        .catch(() => {
          document.getElementById("discord-count").textContent = "N/A";
        });
      // Youtube
      fetch(
        "https://mixerno.space/api/youtube-channel-counter/user/UCq9MzduXHZDplR16h1upgcQ",
      )
        .then((res) => res.json())
        .then((data) => {
          document.getElementById("yt-subs").textContent = data.counts[0].count;
        })
        .catch(() => {
          document.getElementById("yt-subs").textContent = "N/A";
        });
      // Twitch
      fetch("https://decapi.me/twitch/followcount/mrexpence")
        .then((res) => res.text())
        .then((count) => {
          document.getElementById("follower-count").textContent = count;
        })
        .catch(() => {
          document.getElementById("follower-count").textContent = "N/A";
        });
      // Instagram
      fetch("https://www.instagram.com/YOUR_USERNAME/?__a=1&__d=dis")
        .then((res) => res.json())
        .then((data) => {
          setCountText(
            "instagram-count",
            formatCount(data.graphql?.user?.edge_followers?.count),
          );
        })
        .catch(() => setCountText("instagram-count", "N/A"));

      // Twitter/X
      setCountText("twitter-count", "N/A");

      // Reddit
      fetch("https://www.reddit.com/user/YOUR_USERNAME/about.json")
        .then((res) => res.json())
        .then((data) => {
          setCountText("reddit-count", formatCount(data.data?.total_karma));
        })
        .catch(() => setCountText("reddit-count", "N/A"));

      // Telegram
      setCountText("telegram-count", "N/A");
      const UA = "Mr-Expence/vitepress-site";


      // ── Full cards ──
      async function fetchProject(slug) {
        const res = await fetch(`https://api.modrinth.com/v2/project/${slug}`, {
          headers: { "User-Agent": UA },
        });
        return res.json();
      }

      function formatNum(n) {
        if (!n) return "0";
        if (n >= 1_000_000) return (n / 1_000_000).toFixed(1) + "M";
        if (n >= 1_000) return (n / 1_000).toFixed(1) + "K";
        return n.toLocaleString();
      }


      document.querySelectorAll(".mr-card[data-slug]").forEach(async (el) => {
        const { slug, type, author } = el.dataset;
        el.href = `/projects/${slug}`;
        try {
          const d = await fetchProject(slug);
          if (d.icon_url) {
            el.querySelector(".mr-icon").innerHTML =
              `<img src="${d.icon_url}" alt="${d.title}">`;
          } else {
            el.querySelector(".mr-icon-fallback").textContent =
              d.title?.[0] ?? "?";
          }
          el.querySelector(".mr-title").textContent = d.title;
          el.querySelector(".mr-author").textContent = author
            ? `by ${author}`
            : "";
          el.querySelector(".mr-desc").textContent = d.description;
          el.querySelector(".mr-meta").innerHTML = `
          <span class="mr-stat">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" class="h-6 w-6 text-secondary"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 0 0 3 3h10a3 3 0 0 0 3-3v-1m-4-4-4 4m0 0-4-4m4 4V4"></path></svg>
            ${formatNum(d.downloads)} downloads
          </span>
          <span class="mr-stat">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" viewBox="0 0 24 24" class="h-6 w-6 text-secondary"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 0 0 0 6.364L12 20.364l7.682-7.682a4.5 4.5 0 0 0-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 0 0-6.364 0"></path></svg>
            ${formatNum(d.followers)} followers
          </span>
          ${(d.categories ?? [])
              .slice(0, 2)
              .map((c) => `<span class="mr-tag">${c}</span>`)
              .join("")}
        `;
        } catch (e) {
          el.querySelector(".mr-title").textContent = slug;
        }
      });
      // Wraps the callback-based Itch.getGameData into a Promise
      // so we can use async/await like the Modrinth cards do.
      function fetchItchGame(user, game) {
        return new Promise((resolve, reject) => {
          Itch.getGameData({
            user,
            game,
            onComplete: (data) => {
              // itch.io returns null if the game isn't found or is private
              if (data) resolve(data);
              else reject(new Error(`No data for ${user}/${game}`));
            },
          });
        });
      }

      // Picks an icon letter from the title as a fallback (same pattern as Modrinth cards)
      function itchFallbackIcon(el, title) {
        el.querySelector(".mr-icon").innerHTML =
          `<span class="mr-icon-fallback">${title?.[0] ?? "?"}</span>`;
      }

      // Runs on every .itch-card that has both data-user and data-game
      document.querySelectorAll(".itch-card[data-user][data-game]").forEach(async (el) => {
        const { user, game } = el.dataset;

        // Set the href immediately so even a broken card is still a valid link
        el.href = `/games/${game}`;

        try {
          const d = await fetchItchGame(user, game);

          // Title
          el.querySelector(".mr-title").textContent = d.title ?? game;

          // If no cover image was hardcoded, show a letter fallback
          const icon = el.querySelector(".mr-icon");
          if (!icon.querySelector("img")) {
            itchFallbackIcon(el, d.title);
          }

          // Price tag — shows "Free" for $0.00, sale price if active, otherwise normal price
          let priceHTML = "";
          if (!d.price || d.price === "$0.00") {
            priceHTML = `<span class="mr-tag">Free</span>`;
          } else if (d.sale) {
            // Sale: show the discounted price and the original struck-through
            priceHTML = `
          <span class="mr-tag">${d.price}</span>
          <span class="mr-stat" style="text-decoration: line-through; opacity: 0.5;">
            ${d.original_price}
          </span>
          <span class="mr-tag" style="background: #e45c5c22; color: #e45c5c;">
            −${d.sale.rate}%
          </span>`;
          } else {
            priceHTML = `<span class="mr-tag">${d.price}</span>`;
          }

          el.querySelector(".mr-meta").innerHTML = `
        <span class="mr-stat">
          <!-- itch.io logo icon, inline SVG -->
          <svg role="img" viewBox="0 0 24 24" fill="#ffffff"  xmlns="http://www.w3.org/2000/svg"><title>Itch.io</title><path d="M3.13 1.338C2.08 1.96.02 4.328 0 4.95v1.03c0 1.303 1.22 2.45 2.325 2.45 1.33 0 2.436-1.102 2.436-2.41 0 1.308 1.07 2.41 2.4 2.41 1.328 0 2.362-1.102 2.362-2.41 0 1.308 1.137 2.41 2.466 2.41h.024c1.33 0 2.466-1.102 2.466-2.41 0 1.308 1.034 2.41 2.363 2.41 1.33 0 2.4-1.102 2.4-2.41 0 1.308 1.106 2.41 2.435 2.41C22.78 8.43 24 7.282 24 5.98V4.95c-.02-.62-2.082-2.99-3.13-3.612-3.253-.114-5.508-.134-8.87-.133-3.362 0-7.945.053-8.87.133zm6.376 6.477a2.74 2.74 0 0 1-.468.602c-.5.49-1.19.795-1.947.795a2.786 2.786 0 0 1-1.95-.795c-.182-.178-.32-.37-.446-.59-.127.222-.303.412-.486.59a2.788 2.788 0 0 1-1.95.795c-.092 0-.187-.025-.264-.052-.107 1.113-.152 2.176-.168 2.95v.005l-.006 1.167c.02 2.334-.23 7.564 1.03 8.85 1.952.454 5.545.662 9.15.663 3.605 0 7.198-.21 9.15-.664 1.26-1.284 1.01-6.514 1.03-8.848l-.006-1.167v-.004c-.016-.775-.06-1.838-.168-2.95-.077.026-.172.052-.263.052a2.788 2.788 0 0 1-1.95-.795c-.184-.178-.36-.368-.486-.59-.127.22-.265.412-.447.59a2.786 2.786 0 0 1-1.95.794c-.76 0-1.446-.303-1.948-.793a2.74 2.74 0 0 1-.468-.602 2.738 2.738 0 0 1-.463.602 2.787 2.787 0 0 1-1.95.794h-.16a2.787 2.787 0 0 1-1.95-.793 2.738 2.738 0 0 1-.464-.602zm-2.004 2.59v.002c.795.002 1.5 0 2.373.953.687-.072 1.406-.108 2.125-.107.72 0 1.438.035 2.125.107.873-.953 1.578-.95 2.372-.953.376 0 1.876 0 2.92 2.934l1.123 4.028c.832 2.995-.266 3.068-1.636 3.07-2.03-.075-3.156-1.55-3.156-3.025-1.124.184-2.436.276-3.748.277-1.312 0-2.624-.093-3.748-.277 0 1.475-1.125 2.95-3.156 3.026-1.37-.004-2.468-.077-1.636-3.072l1.122-4.027c1.045-2.934 2.545-2.934 2.92-2.934zM12 12.714c-.002.002-2.14 1.964-2.523 2.662l1.4-.056v1.22c0 .056.56.033 1.123.007.562.026 1.124.05 1.124-.008v-1.22l1.4.055C14.138 14.677 12 12.713 12 12.713z"/></svg>
          itch.io
        </span>
        ${priceHTML}
      `;
        } catch (e) {
          // If the fetch fails, at least show the slug so the card isn't blank
          el.querySelector(".mr-title").textContent = game;
          el.querySelector(".mr-meta").innerHTML =
            `<span class="mr-stat" style="opacity:0.5;">Could not load data</span>`;
          console.warn(`itch.io card failed for ${user}/${game}:`, e);
        }
      });
    </script>
    <script src="footer.js"></script>
</body>

</html>
