<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mr_Expence's Games</title>
  <link rel="icon" type="image/x-icon" href="/assets/cat_logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap"
    rel="stylesheet">
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/style/base.css">
  <link rel="stylesheet" href="/style/projects.css">
  <link rel="stylesheet" href="/style/topbar.css">
  <script src="https://static.itch.io/api.js"></script>
</head>

<body>
  <script src="/scripts/header.js"></script>
  <div class="page-wrap">
  </div>
  <div class="wrapper">
    <a class="brand" href="https://mr-expence.github.io" target="_self">
      <img src="/assets/cat_logo.png" alt="Mr_Expence" onerror="this.style.display = 'none'" />
      <span class="brand-name" style="color: #e4e6f0">Mr_Expence</span>
    </a>

    <h1 class="heading">
      My
      <em>Games</em>
    </h1>
    <div class="modrinth-list">

      <a class="mr-card itch-card" data-user="mrexpence" data-game="bounty" href="#">
        <div class="mr-icon">
          <!-- Optional: hardcode a cover image if you have one -->
          <img src="/assets/bounty/bounty-icon.png" alt="Cover">
        </div>
        <div class="mr-body">
          <div class="mr-header">
            <span class="mr-title">Loading…</span>
            <span class="mr-author">by Mr_Expence</span>
          </div>
          <p class="mr-desc"></p>
          <div class="mr-meta"></div>
        </div>
      </a>

    </div>
    <script src="/scripts/games.js"></script>
    <script src="/scripts/footer.js"></script>
</body>

</html>
