<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Problem Picker</title>
  <link rel="icon" type="image/x-icon" href="/assets/cat_logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap"
    rel="stylesheet">
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/style/base.css">
  <link rel="stylesheet" href="/style/picker.css">
  <link rel="stylesheet" href="/style/topbar.css">
</head>

<body>
  <script src="/scripts/header.js"></script>
  <div class="page-wrap">
  </div>
  <div class="wrapper">
    <a class="brand" href="/" target="_blank">
      <img src="/assets/cat_logo.png" alt="Mr_Expence" onerror="this.style.display = 'none'" />
      <span class="brand-name" style="color: #e4e6f0">Mr_Expence</span>
    </a>

    <h1 class="heading">
      Problem <br />
      <em>Picker</em>
    </h1>
    <p class="sub">
      Get a random Codeforces problem based on rating range.
    </p>
    <div class="picker-container">
      <div>
        <label>Min</label>
        <select id="min-rating">
          <option value="800" selected>800</option>
          <option value="900">900</option>
          <option value="1000">1000</option>
          <option value="1100">1100</option>
          <option value="1200">1200</option>
          <option value="1300">1300</option>
          <option value="1400">1400</option>
          <option value="1500">1500</option>
          <option value="1600">1600</option>
          <option value="1700">1700</option>
          <option value="1800">1800</option>
          <option value="1900">1900</option>
          <option value="2000">2000</option>
          <option value="2100">2100</option>
          <option value="2200">2200</option>
          <option value="2300">2300</option>
          <option value="2400">2400</option>
          <option value="2500">2500</option>
          <option value="2600">2600</option>
          <option value="2700">2700</option>
          <option value="2800">2800</option>
          <option value="2900">2900</option>
          <option value="3000">3000</option>
          <option value="3100">3100</option>
          <option value="3200">3200</option>
          <option value="3300">3300</option>
          <option value="3400">3400</option>
          <option value="3500">3500</option>
        </select>
      </div>
      <div>
        <label>Max</label>
        <select id="max-rating">
          <option value="800">800</option>
          <option value="900">900</option>
          <option value="1000">1000</option>
          <option value="1100">1100</option>
          <option value="1200">1200</option>
          <option value="1300">1300</option>
          <option value="1400">1400</option>
          <option value="1500">1500</option>
          <option value="1600">1600</option>
          <option value="1700">1700</option>
          <option value="1800">1800</option>
          <option value="1900">1900</option>
          <option value="2000">2000</option>
          <option value="2100">2100</option>
          <option value="2200">2200</option>
          <option value="2300">2300</option>
          <option value="2400">2400</option>
          <option value="2500">2500</option>
          <option value="2600">2600</option>
          <option value="2700">2700</option>
          <option value="2800">2800</option>
          <option value="2900">2900</option>
          <option value="3000">3000</option>
          <option value="3100">3100</option>
          <option value="3200">3200</option>
          <option value="3300">3300</option>
          <option value="3400">3400</option>
          <option value="3500" selected>3500</option>
        </select>
      </div>
      <button id="roll-btn"
        onclick="roll(+document.getElementById('min-rating').value, +document.getElementById('max-rating').value)">
        🎲 Random Problem
      </button>
    </div>
  </div>
  <script src="/scripts/problems.js"></script>
  <script src="/scripts/footer.js"></script>
</body>

</html>
