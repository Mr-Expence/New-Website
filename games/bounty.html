<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bounty</title>
    <link rel="icon" href="/assets/cat_logo.png">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap"
        rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/style/base.css">
    <link rel="stylesheet" href="/style/topbar.css">
</head>

<body>
    <!-- ── Topbar ──────────────────────────────────────────────── -->
    <script src="/scripts/header.js"></script>

    <div class="wrapper">

        <center>

            <br><br><br>

            <img src="/assets/bounty/bounty-logo.png" width="566" height="114" alt="Logo"><br>

            <!-- Summary -->

            <h2>My first game for the <a href="https://itch.io/jam/godot-wild-jam-93" target="_blank"
                    rel="noopener">Godot Wild Jam</a></h2>
            <br>

            <div style="
                width: 640px;
                -webkit-border-radius: 10px; 
                -moz-border-radius: 10px;
                border-radius: 10px; 
                overflow: hidden; 
                box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);">
                <iframe frameborder="0" src="https://itch.io/embed-upload/17568201?color=0f0f0f" allowfullscreen=""
                    width="640" height="380"><a href="https://mrexpence.itch.io/bounty">Play Bounty on
                        itch.io</a></iframe>
            </div>

            <p>
                <br><br>
                <iframe frameborder="0"
                    src="https://itch.io/embed/4581020?linkback=true&amp;bg_color=0f0f0f&amp;fg_color=ffffff&amp;link_color=fa5c5c&amp;border_color=3f3f3f"
                    width="552" height="167"><a href="https://mrexpence.itch.io/bounty">Bounty by
                        Mr_Expence</a></iframe>
                <br><br>
                You are a car being chased by Police
                <br><br>
                Use the <code>spacebar</code> or <code>right-click</code> to fire
                <br><br>
                Use <code>W</code> <code>A</code> <code>S</code> <code>D</code> to move
                <br><br>
                The game jam theme was <code>Bounty</code>
                <br><br>
                It is made with Godot
                <br><br>
                Used <a href="https://github.com/Maaack/Godot-Minimal-Game-Template" target="_blank"
                    rel="noopener">Maaack's Godot Minimal Game Template</a>
            </p>
            <br><br><br>

            <!-- Images -->

            <img src="/assets/bounty/menu.png" width="687.8" height="287.8" alt="Menu"><br><br>
            <img src="/assets/bounty/screen-1.png" width="687.8" height="287.8" alt="Screenshot 1"><br><br>
            <img src="/assets/bounty/screen-2.png" width="687.8" height="287.8" alt="Screenshot 2"><br><br>
            <img src="/assets/bounty/screen-3.png" width="687.8" height="287.8" alt="Screenshot 3"><br><br>

        </center>
    </div><!-- /page-wrap -->
    <script src="/scripts/footer.js"></script>

</html>
